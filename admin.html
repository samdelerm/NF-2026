<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NF-2026 | Admin caché</title>
  <style>
    :root {
      --bg: #0d1117;
      --card: #161b22;
      --border: #30363d;
      --text: #e6edf3;
      --muted: #8b949e;
      --accent: #2f81f7;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, sans-serif;
      color: var(--text);
      background: radial-gradient(circle at 20% 10%, #1f2937, var(--bg) 40%);
      display: grid;
      place-items: center;
      padding: 20px;
    }

    .card {
      width: min(520px, 100%);
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 20px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 1.25rem;
    }

    p {
      margin: 0 0 16px;
      color: var(--muted);
      font-size: 0.95rem;
      line-height: 1.5;
    }

    form {
      display: grid;
      gap: 12px;
    }

    label {
      display: grid;
      gap: 6px;
      font-size: 0.92rem;
    }

    input, select, button {
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 12px;
      font-size: 0.95rem;
      color: var(--text);
      background: #0d1117;
    }

    button {
      cursor: pointer;
      background: var(--accent);
      border: 0;
      color: #fff;
      font-weight: 600;
    }

    .status {
      margin-top: 10px;
      font-size: 0.92rem;
      min-height: 1.2em;
    }

    .ok { color: #3fb950; }
    .error { color: #ff7b72; }
  </style>
</head>
<body>
  <section class="card" aria-label="Configuration tablette">
    <h1>Configuration robot (tablette)</h1>
    <p>Cette page est cachée. Les réglages sont liés à cette tablette via cookie de session.</p>

    <form id="configForm">
      <label>
        Host robot
        <input type="text" id="host" name="host" placeholder="ex: 192.168.1.42" required>
      </label>

      <label>
        Couleur équipe
        <select id="color" name="color" required>
          <option value="green">green</option>
          <option value="blue">blue</option>
        </select>
      </label>

      <label>
        Identifiant robot
        <select id="id" name="id" required>
          <option value="1">1</option>
          <option value="2">2</option>
        </select>
      </label>

      <button type="submit">Enregistrer</button>
    </form>

    <div id="status" class="status"></div>
  </section>

  <script>
    const form = document.getElementById("configForm");
    const hostInput = document.getElementById("host");
    const colorInput = document.getElementById("color");
    const idInput = document.getElementById("id");
    const statusEl = document.getElementById("status");

    function setStatus(message, isError = false) {
      statusEl.textContent = message;
      statusEl.className = `status ${isError ? "error" : "ok"}`;
    }

    async function loadConfig() {
      try {
        const response = await fetch("/api/config");
        const data = await response.json();
        if (!data.configured) {
          setStatus("Aucune configuration active pour cette tablette.", false);
          return;
        }

        hostInput.value = data.config.host || "";
        colorInput.value = data.config.color || "green";
        idInput.value = String(data.config.id || 1);
        setStatus("Configuration actuelle chargée.", false);
      } catch (error) {
        setStatus("Impossible de charger la configuration.", true);
      }
    }

    form.addEventListener("submit", async (event) => {
      event.preventDefault();

      const payload = {
        host: hostInput.value.trim(),
        color: colorInput.value,
        id: Number(idInput.value),
      };

      try {
        const response = await fetch("/api/config", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload),
        });

        const data = await response.json();
        if (!response.ok || !data.ok) {
          setStatus(data.error || "Erreur de sauvegarde.", true);
          return;
        }

        setStatus("Configuration enregistrée.", false);
      } catch (error) {
        setStatus("Erreur réseau pendant la sauvegarde.", true);
      }
    });

    loadConfig();
  </script>
</body>
</html>
