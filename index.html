<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NF-2026 | Commande directionnelle</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="shell">
    <section class="control-panel card" aria-label="Contrôle joystick">
      <div class="joystick-shell">
        <div class="joystick-pad" id="joystickPad" aria-label="Joystick virtuel" role="application">
          <div class="joystick-rings"></div>
          <div class="joystick-base">
            <div class="joystick-knob" id="joystickKnob" aria-hidden="true"></div>
          </div>
        </div>

        <div class="partner-row" aria-label="Partenaires de l'animation">
          <div class="partner-logo partner-logo-lycee partner-logo-image" title="Lycée professionnel Philadelphe de Gerde" aria-label="Lycée professionnel Philadelphe de Gerde">
            <img src="image.png" alt="Logo Lycée professionnel Philadelphe de Gerde">
          </div>
          <div class="partner-logo partner-logo-region partner-logo-image" title="Région Nouvelle-Aquitaine" aria-label="Région Nouvelle-Aquitaine">
            <img src="LOGO_RNA_RVB_ROUGE.png" alt="Logo Région Nouvelle-Aquitaine">
          </div>
          <div class="partner-logo partner-logo-robotique partner-logo-image" title="Fédération Française de Robotique" aria-label="Fédération Française de Robotique">
            <img src="image copy 2.png" alt="Logo Fédération Française de Robotique">
          </div>
          <div class="partner-logo partner-logo-cap partner-logo-image" title="Cap Sciences" aria-label="Cap Sciences">
            <img src="image copy.png" alt="Logo Cap Sciences">
          </div>
        </div>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
